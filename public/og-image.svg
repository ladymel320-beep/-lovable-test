<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="100" r="80" fill="#6366f1" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#ec4899" opacity="0.1"/>
  <circle cx="900" cy="150" r="60" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Logo icon -->
  <g transform="translate(500, 180)">
    <circle r="60" fill="url(#textGrad)"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">✨</text>
  </g>
  
  <!-- Main text -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#1f2937" text-anchor="middle">Website Builder Express</text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="32" fill="#6b7280" text-anchor="middle">Build Amazing Experiences</text>
  
  <!-- Feature badges -->
  <g transform="translate(300, 480)">
    <rect width="180" height="50" rx="25" fill="white" opacity="0.9"/>
    <text x="90" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#6366f1" text-anchor="middle">🚀 Fast</text>
  </g>
  
  <g transform="translate(510, 480)">
    <rect width="180" height="50" rx="25" fill="white" opacity="0.9"/>
    <text x="90" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#8b5cf6" text-anchor="middle">💎 Beautiful</text>
  </g>
  
  <g transform="translate(720, 480)">
    <rect width="180" height="50" rx="25" fill="white" opacity="0.9"/>
    <text x="90" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#ec4899" text-anchor="middle">⚡ Modern</text>
  </g>
</svg>
